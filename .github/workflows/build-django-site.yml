name: Build Django Video Site (Debug)

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare log folder
        run: |
          mkdir -p build
          touch build/build-log.txt
          echo "=== BUILD START ===" >> build/build-log.txt
          date >> build/build-log.txt

      - name: Setup Python
        run: |
          echo "Installing Python info..." >> build/build-log.txt
          python3 --version >> build/build-log.txt 2>&1 || true

      - name: Install Django
        run: |
          echo "Installing dependencies..." >> build/build-log.txt
          pip install django gunicorn whitenoise >> build/build-log.txt 2>&1 || true
