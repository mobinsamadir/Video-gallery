name: Build Django Video Site

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Django
        run: |
          pip install django gunicorn whitenoise

      - name: Create Django project if missing
        run: |
          if [ ! -f manage.py ]; then
            django-admin startproject config .
          fi

      - name: Create gallery app
        run: |
          if [ ! -d gallery ]; then
            python manage.py startapp gallery
