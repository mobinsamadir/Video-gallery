name: Django Builder DEBUG

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare debug environment
        run: |
          mkdir -p build
          touch build/debug-log.txt

          echo "===== BUILD START =====" >> build/debug-log.txt
          date >> build/debug-log.txt

          echo "" >> build/debug-log.txt
          echo "=== SYSTEM INFO ===" >> build/debug-log.txt
          uname -a >> build/debug-log.txt

          echo "" >> build/debug-log.txt
          echo "=== PYTHON VERSION ===" >> build/debug-log.txt
          python3 --version >> build/debug-log.txt 2>&1 || true

          echo "" >> build/debug-log.txt
          echo "=== PIP VERSION ===" >> build/debug-log.txt
          pip --version >> build/debug-log.txt 2>&1 || true

      - name: Repo structure before build
        run: |
          echo "" >> build/debug-log.txt
          echo "=== FILES BEFORE BUILD ===" >> build/debug-log.txt
          ls -R >> build/debug-log.txt

      - name: Install dependencies
        run: |
          echo "" >> build/debug-log.txt
          echo "=== INSTALL DJANGO ===" >> build/debug-log.txt
          pip install django gunicorn whitenoise >> build/debug-log.txt 2>&1 || true

      - name: Create Django project
        run: |
          echo "" >> build/debug-log.txt
          echo "=== CREATE DJANGO PROJECT ===" >> build/debug-log.txt

          if [ ! -f manage.py ]; then
            django-admin startproject config . >> build/debug-log.txt 2>&1 || true
            echo "Project created" >> build/debug-log.txt
          else
            echo "manage.py already exists" >> build/debug-log.txt
          fi

      - name: Create gallery app
        run: |
          echo "" >> build/debug-log.txt
          echo "=== CREATE GALLERY APP ===" >> build/debug-log.txt

          mkdir -p gallery >> build/debug-log.txt 2>&1
          touch gallery/__init__.py
          echo "gallery created" >> build/debug-log.txt

      - name: Create folders
        run: |
          echo "" >> build/debug-log.txt
          echo "=== CREATE STATIC/TEMPLATE ===" >> build/debug-log.txt

          mkdir -p templates
          mkdir -p static

          echo "folders created" >> build/debug-log.txt

      - name: Move files
        run: |
          echo "" >> build/debug-log.txt
          echo "=== MOVE FILES ===" >> build/debug-log.txt

          if [ -f index.html ]; then mv index.html templates/index.html; fi
          if [ -f style.css ]; then mv style.css static/style.css; fi
          if [ -f script.js ]; then mv script.js static/script.js; fi
          if [ -f videos.json ]; then mv videos.json gallery/videos.json; fi

          echo "files moved if existed" >> build/debug-log.txt

      - name: Create views
        run: |
          echo "" >> build/debug-log.txt
          echo "=== CREATE views.py ===" >> build/debug-log.txt

          cat <<EOF > gallery/views.py
import json
from django.shortcuts import render
from pathlib import Path

def index(request):
    json_path = Path(__file__).resolve().parent / "videos.json"
    videos = []
    if json_path.exists():
        with open(json_path) as f:
            videos = json.load(f)
    return render(request, "index.html", {"videos": videos})
EOF

      - name: Create urls
        run: |
          echo "" >> build/debug-log.txt
          echo "=== CREATE urls.py ===" >> build/debug-log.txt

          cat <<EOF > gallery/urls.py
from django.urls import path
from .views import index

urlpatterns = [
    path('', index, name='home'),
]
EOF

      - name: Patch settings
        run: |
          echo "" >> build/debug-log.txt
          echo "=== PATCH settings.py ===" >> build/debug-log.txt

          sed -i "/INSTALLED_APPS = \[/a \ \ \ \ 'gallery'," config/settings.py >> build/debug-log.txt 2>&1 || true

          echo "STATIC_URL = '/static/'" >> config/settings.py
          echo "STATICFILES_DIRS = [BASE_DIR / 'static']" >> config/settings.py
          echo "STATIC_ROOT = BASE_DIR / 'staticfiles'" >> config/settings.py

      - name: Patch urls
        run: |
          echo "" >> build/debug-log.txt
          echo "=== PATCH urls.py ===" >> build/debug-log.txt

          sed -i "s/from django.urls import path/from django.urls import path, include/" config/urls.py >> build/debug-log.txt 2>&1 || true
          sed -i "s/urlpatterns = \[/urlpatterns = \[\n    path('', include('gallery.urls')),/" config/urls.py >> build/debug-log.txt 2>&1 || true

      - name: Collect static
        run: |
          echo "" >> build/debug-log.txt
          echo "=== COLLECTSTATIC ===" >> build/debug-log.txt
          python manage.py collectstatic --noinput >> build/debug-log.txt 2>&1 || true

      - name: Repo structure after build
        run: |
          echo "" >> build/debug-log.txt
          echo "=== FILES AFTER BUILD ===" >> build/debug-log.txt
          ls -R >> build/debug-log.txt

      - name: Zip site
        run: |
          echo "" >> build/debug-log.txt
          echo "=== CREATE ZIP ===" >> build/debug-log.txt
          zip -r build/site.zip . -x "*.git*" "build/*" >> build/debug-log.txt 2>&1 || true

      - name: Finish log
        run: |
          echo "" >> build/debug-log.txt
          echo "===== BUILD END =====" >> build/debug-log.txt
          date >> build/debug-log.txt

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: build/debug-log.txt

      - name: Commit results
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add build/debug-log.txt build/site.zip || true
          git commit -m "debug build output" || echo "nothing to commit"
          git push
