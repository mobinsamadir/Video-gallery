name: Repo Debug

on:
  workflow_dispatch:
  push:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create debug folder
        run: mkdir debug

      - name: System info
        run: |
          echo "===== SYSTEM INFO =====" >> debug/report.txt
          uname -a >> debug/report.txt
          python3 --version >> debug/report.txt || true
          node --version >> debug/report.txt || true
          git --version >> debug/report.txt

      - name: Repo structure
        run: |
          echo "" >> debug/report.txt
          echo "===== REPO STRUCTURE =====" >> debug/report.txt
          ls -R >> debug/report.txt

      - name: List workflows
        run: |
          echo "" >> debug/report.txt
          echo "===== WORKFLOWS =====" >> debug/report.txt
          ls -R .github >> debug/report.txt || true

      - name: Show workflow files
        run: |
          echo "" >> debug/report.txt
          echo "===== WORKFLOW CONTENT =====" >> debug/report.txt
          for f in .github/workflows/*.yml; do
            echo "" >> debug/report.txt
            echo "---- $f ----" >> debug/report.txt
            cat $f >> debug/report.txt
          done

      - name: Show important files
        run: |
          echo "" >> debug/report.txt
          echo "===== IMPORTANT FILES =====" >> debug/report.txt

          if [ -f index.html ]; then
            echo "--- index.html ---" >> debug/report.txt
            cat index.html >> debug/report.txt
          fi

          if [ -f script.js ]; then
            echo "--- script.js ---" >> debug/report.txt
            cat script.js >> debug/report.txt
          fi

          if [ -f style.css ]; then
            echo "--- style.css ---" >> debug/report.txt
            cat style.css >> debug/report.txt
          fi

          if [ -f videos.json ]; then
            echo "--- videos.json ---" >> debug/report.txt
            cat videos.json >> debug/report.txt
          fi

      - name: Zip repo snapshot
        run: zip -r debug/repo-snapshot.zip . -x "*.git*"

      - name: Commit debug files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add debug/
          git commit -m "add debug files" || echo "nothing to commit"
          git push

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-debug
          path: debug/
