name: Build ZIP

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'build/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create build folder
        run: mkdir -p build
      - name: Create ZIP
        run: |
          zip -r build/site.zip . \
          -x "*.git*" \
          -x "build/*" \
          -x "node_modules/*"

      - name: Commit ZIP
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add build/site.zip
          git commit -m "auto build zip"
          git push